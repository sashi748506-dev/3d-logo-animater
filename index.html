<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Easy 3D Logo Maker</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #222, #000); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); display: flex; gap: 10px; z-index: 10; }
        input { padding: 12px; border-radius: 8px; border: none; outline: none; width: 200px; font-size: 16px; }
        button { padding: 12px 25px; border-radius: 8px; border: none; background: #00d1b2; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00b89c; transform: scale(1.05); }
        .instructions { position: absolute; top: 20px; width: 100%; text-align: center; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

    <div class="instructions">Mouse se pakad kar ghumayein aur scroll se zoom karein</div>

    <div id="ui">
        <input type="text" id="textInput" placeholder="Apna naam likhein" value="HEAVEN">
        <button id="updateBtn">Generate 3D</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, textMesh, controls;

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Controls (Mouse Interaction)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            loadText("HEAVEN");

            animate();
        }

        function loadText(msg) {
            const loader = new THREE.FontLoader();
            // Google's Open Source Font
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', function (font) {
                if (textMesh) scene.remove(textMesh);

                const geometry = new THREE.TextGeometry(msg, {
                    font: font,
                    size: 2,
                    height: 0.5,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.1,
                    bevelSize: 0.1,
                });

                geometry.center(); // Center the text

                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x00d1b2, 
                    metalness: 0.7, 
                    roughness: 0.2 
                });
                
                textMesh = new THREE.Mesh(geometry, material);
                scene.add(textMesh);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (textMesh) textMesh.rotation.y += 0.005; // Dheere se rotate hoga
            controls.update();
            renderer.render(scene, camera);
        }

        document.getElementById('updateBtn').addEventListener('click', () => {
            const val = document.getElementById('textInput').value;
            loadText(val);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
